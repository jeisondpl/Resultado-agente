# Server
server.port=8080
server.servlet.context-path=/allmsisdn

# Controller base path
controller.properties.base-path=/${project.name:allmsisdn}

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

# JDBC (si aplica) — TODAS con default para evitar romper arranque
spring.datasource.url=${db.url:jdbc:postgresql://localhost:5432/db}
spring.datasource.username=${db.user:postgres}
spring.datasource.password=${db.pass:postgres}

# Spring 4 — bean overriding
spring.main.allow-bean-definition-overriding=true
